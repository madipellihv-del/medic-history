<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MedicHistory — Secure enterprise platform for managing patient medical records and emergency information.">
    <title>MedicHistory — Enterprise Medical Records</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-brand" data-route="dashboard">
                <svg class="sidebar-logo" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                <span class="sidebar-title">Medic<span class="accent">History</span></span>
            </div>
            <button class="sidebar-close" id="sidebar-close-btn" aria-label="Close menu">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <nav class="sidebar-nav" id="sidebar-nav">
            <!-- Populated by app.js -->
        </nav>

        <div class="sidebar-footer" id="sidebar-footer">
            <!-- User info + logout populated by app.js -->
        </div>
    </aside>

    <!-- Main Layout -->
    <div class="main-wrapper" id="main-wrapper">
        <!-- Top Bar -->
        <header class="topbar" id="topbar">
            <button class="topbar-hamburger" id="topbar-hamburger" aria-label="Open menu">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="topbar-breadcrumb" id="breadcrumb">
                <!-- Populated by app.js -->
            </div>
            <div class="topbar-right" id="topbar-right">
                <!-- Role badge + user info populated by app.js -->
            </div>
        </header>

        <!-- Main Content Area -->
        <main id="app-content" class="main-content">
            <!-- Pages rendered here by app.js -->
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="footer-inner">
                <div class="footer-left">
                    <span class="footer-brand">MedicHistory</span>
                    <span class="footer-copy">&copy; 2026 All rights reserved.</span>
                </div>
                <div class="footer-right">
                    <span class="footer-badge">HIPAA Compliant</span>
                    <span class="footer-badge">ISO 27001</span>
                    <span class="footer-version">v2.0.0</span>
                </div>
            </div>
        </footer>
    </div>

    <!-- Sidebar Overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="db.js"></script>
    <script src="auth.js"></script>
    <script src="location-data.js"></script>
    <script src="autocomplete.js"></script>
    <script src="pages/login.js"></script>
    <script src="pages/signup.js"></script>
    <script src="pages/verify-patient.js"></script>
    <script src="pages/dashboard.js"></script>
    <script src="pages/register.js"></script>
    <script src="pages/medical-history.js"></script>
    <script src="pages/patient-list.js"></script>
    <script src="pages/emergency-card.js"></script>
    <script src="app.js"></script>
</body>
</html>
